<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>めあともえの部屋 | きみ夏宵あそび</title>
  <meta name="description" content="主催・めあともえの部屋。水中窓から外を覗いてみよう。">
  <style>
    /* ═══════════════════════════════════════════
       BASE
    ═══════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #0a0820;
      font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
      color: #f6f0e8;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══════════════════════════════════════════
       ROOM SCENE (部屋全体)
    ═══════════════════════════════════════════ */
    #room-scene {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(10, 8, 24, 0.45) 0%, rgba(8, 6, 20, 0.35) 50%, rgba(6, 5, 16, 0.6) 100%),
        url('assets/room.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* 部屋の雰囲気を統一する薄いカラーオーバーレイ */
    #room-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(10, 12, 40, 0.4) 100%);
      pointer-events: none;
    }

    /* タイトル */
    .room-title {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    .room-title .en {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      color: rgba(240, 190, 80, 0.7);
      display: block;
      margin-bottom: 6px;
    }
    .room-title .ja {
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      color: rgba(255, 248, 240, 0.9);
      text-shadow: 0 0 12px rgba(155, 114, 207, 0.5);
    }

    /* ═══════════════════════════════════════════
       UNDERWATER WINDOW (中央の水中窓)
    ═══════════════════════════════════════════ */
    /* ═══════════════════════════════════════════
       ROOM CHOICES (2つの導線)
    ═══════════════════════════════════════════ */
    .room-choices {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: clamp(20px, 6vw, 80px);
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      padding: 0 24px;
      z-index: 5;
    }
    .room-choice {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      cursor: pointer;
    }
    .choice-label {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .choice-en {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: rgba(240, 190, 80, 0.7);
    }
    .choice-ja {
      font-family: 'Noto Serif JP', serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: rgba(255, 248, 240, 0.9);
      text-shadow: 0 0 12px rgba(155, 114, 207, 0.5);
    }

    /* フォトパネルの見た目（立ち絵入り青フレーム） */
    .photo-panel-visual {
      width: min(40vw, 40vh, 240px);
      aspect-ratio: 3 / 4;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: transform 0.4s ease;
    }
    .room-choice:hover .photo-panel-visual { transform: translateY(-6px); }
    .panel-frame-deco {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      background: linear-gradient(160deg,
        rgba(60, 120, 200, 0.3) 0%,
        rgba(30, 70, 150, 0.25) 100%);
      border: 3px solid rgba(120, 180, 240, 0.6);
      box-shadow:
        0 0 30px rgba(80, 140, 220, 0.4),
        inset 0 0 40px rgba(40, 100, 180, 0.3);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .panel-preview-img {
      max-width: 90%;
      max-height: 95%;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0, 30, 80, 0.5));
    }

    /* 水中窓を2導線サイズに調整 */
    #window-frame {
      position: relative;
      top: auto;
      left: auto;
      transform: none;
      width: min(40vw, 40vh, 240px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      cursor: pointer;
      z-index: 5;
      /* 窓枠の金属感 */
      box-shadow:
        0 0 0 12px rgba(60, 50, 80, 0.95),
        0 0 0 14px rgba(180, 160, 200, 0.6),
        0 0 0 22px rgba(40, 35, 60, 0.95),
        0 0 80px rgba(80, 140, 220, 0.4),
        inset 0 0 60px rgba(0, 20, 60, 0.5);
      transition: box-shadow 0.4s ease, transform 0.4s ease;
      overflow: hidden;
      isolation: isolate;
    }

    #window-frame:hover {
      box-shadow:
        0 0 0 12px rgba(60, 50, 80, 0.95),
        0 0 0 14px rgba(220, 200, 240, 0.8),
        0 0 0 22px rgba(40, 35, 60, 0.95),
        0 0 120px rgba(80, 140, 220, 0.7),
        inset 0 0 60px rgba(0, 20, 60, 0.5);
    }

    /* 窓の中：水中プレビュー */
    .window-preview {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(150, 220, 255, 0.4) 0%, transparent 50%),
        linear-gradient(180deg,
          #1a4a78 0%,
          #0e2e5e 40%,
          #061840 80%,
          #030a25 100%);
      animation: previewShimmer 6s ease-in-out infinite;
    }
    @keyframes previewShimmer {
      0%, 100% { filter: brightness(1) hue-rotate(0deg); }
      50%      { filter: brightness(1.15) hue-rotate(-10deg); }
    }

    /* 窓内：泡 */
    .preview-bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%,
        rgba(255, 255, 255, 0.9),
        rgba(200, 230, 255, 0.4) 50%,
        rgba(150, 200, 240, 0.1) 100%);
      box-shadow: inset 0 0 4px rgba(255,255,255,0.5);
      animation: bubbleRise linear infinite;
    }
    @keyframes bubbleRise {
      0%   { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-450px) translateX(var(--dx, 20px)) scale(1); opacity: 0; }
    }

    /* タップヒント */
    .window-hint {
      display: none; /* 2導線では下のラベルに統合 */
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; text-shadow: 0 0 18px rgba(160, 220, 255, 1); }
    }

    /* キャプション（窓の下） */
    .room-caption {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: rgba(255, 248, 240, 0.6);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      z-index: 4;
      line-height: 1.8;
    }

    /* ═══════════════════════════════════════════
       CAMERA VIEW (起動後の水中窓ARカメラ)
    ═══════════════════════════════════════════ */
    #camera-view {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      display: none;
      overflow: hidden;
    }
    #camera-view.active { display: block; }

    #camera-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* 水中感: 青寄せ・彩度・コントラスト */
      filter: hue-rotate(180deg) saturate(1.4) contrast(1.05) brightness(0.85);
    }

    /* 水中歪みオーバーレイ (SVG filter で揺らぎ) */
    #camera-distortion {
      position: absolute;
      inset: 0;
      pointer-events: none;
      backdrop-filter: url(#water-distortion);
      -webkit-backdrop-filter: url(#water-distortion);
    }

    /* 青〜深い色のグラデーションを乗算 */
    #camera-blue-tint {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(120, 200, 255, 0.15) 0%, transparent 60%),
        linear-gradient(180deg,
          rgba(40, 120, 200, 0.2) 0%,
          rgba(20, 60, 140, 0.35) 60%,
          rgba(10, 30, 80, 0.55) 100%);
      mix-blend-mode: multiply;
    }

    /* コースティクス（水面の光の差し込み） */
    #camera-caustics {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(115deg,
          transparent 0px,
          rgba(180, 220, 255, 0.08) 30px,
          transparent 60px,
          transparent 120px);
      mix-blend-mode: screen;
      animation: causticsDrift 8s linear infinite;
    }
    @keyframes causticsDrift {
      0%   { transform: translateX(0) translateY(0); }
      100% { transform: translateX(-120px) translateY(60px); }
    }

    /* 気泡レイヤー（Canvasで描画） */
    #bubble-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* 窓枠 (カメラビュー中も丸い窓型を維持) */
    #camera-window-mask {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%,
        transparent 0%,
        transparent 45%,
        rgba(0, 5, 20, 0.6) 70%,
        rgba(0, 5, 20, 0.95) 100%);
      z-index: 8;
    }

    /* ビネット（端を暗く） */
    #camera-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%,
        transparent 30%,
        rgba(0, 10, 40, 0.4) 80%,
        rgba(0, 5, 20, 0.8) 100%);
      z-index: 7;
    }

    /* UI: 撮影ボタンと閉じるボタン */
    .camera-ui {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      align-items: center;
      z-index: 20;
    }

    .ui-btn {
      background: rgba(20, 30, 60, 0.7);
      border: 1px solid rgba(180, 220, 255, 0.5);
      color: #fff;
      padding: 14px 18px;
      border-radius: 50%;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, background 0.2s ease;
      font-size: 1.3rem;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ui-btn:hover {
      background: rgba(40, 80, 140, 0.8);
      transform: scale(1.1);
    }

    .shutter-btn {
      width: 72px;
      height: 72px;
      background: rgba(255, 255, 255, 0.9);
      border: 4px solid rgba(180, 220, 255, 0.9);
      box-shadow: 0 0 30px rgba(120, 200, 255, 0.6);
    }
    .shutter-btn:hover {
      background: rgba(255, 255, 255, 1);
      box-shadow: 0 0 50px rgba(120, 200, 255, 1);
    }
    .shutter-btn::after {
      content: '';
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: transparent;
    }

    /* 撮影フラッシュ */
    #camera-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
    }
    #camera-flash.flash {
      animation: flashAnim 0.4s ease-out;
    }
    @keyframes flashAnim {
      0%   { opacity: 0; }
      20%  { opacity: 0.8; }
      100% { opacity: 0; }
    }

    /* 撮影結果プレビュー */
    #photo-result {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      padding: 24px;
    }
    #photo-result.active { display: flex; }
    #photo-canvas-preview {
      max-width: 90vw;
      max-height: 65vh;
      border-radius: 12px;
      box-shadow: 0 12px 60px rgba(120, 200, 255, 0.3);
    }
    .photo-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .photo-actions a, .photo-actions button {
      padding: 12px 28px;
      border-radius: 999px;
      border: 1px solid rgba(180, 220, 255, 0.5);
      background: rgba(20, 30, 60, 0.7);
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .photo-actions a:hover, .photo-actions button:hover {
      background: rgba(40, 80, 140, 0.8);
      transform: translateY(-2px);
    }
    .photo-actions .share-btn {
      background: linear-gradient(135deg, rgba(20, 30, 60, 0.9), rgba(40, 60, 100, 0.9));
      border-color: rgba(220, 230, 255, 0.6);
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(80, 140, 220, 0.3);
    }
    .photo-actions .share-btn:hover {
      background: linear-gradient(135deg, rgba(40, 60, 120, 0.95), rgba(80, 140, 220, 0.95));
      box-shadow: 0 6px 24px rgba(80, 140, 220, 0.5);
    }

    /* 撮影中の処理表示 */
    #processing-indicator {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 150;
      flex-direction: column;
      gap: 16px;
      color: #fff;
    }
    #processing-indicator.active { display: flex; }
    .processing-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(180, 220, 255, 0.2);
      border-top-color: rgba(180, 220, 255, 0.9);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .processing-text {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.85);
    }

    /* エラー表示 */
    /* ═══════════════════════════════════════════
       PHOTO BOOTH VIEW
    ═══════════════════════════════════════════ */
    #booth-view {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      display: none;
      overflow: hidden;
    }
    #booth-view.active { display: block; }

    #booth-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* 通常カメラ：歪み・色補正なし */
    }

    /* 美顔処理済みフレームの表示用キャンバス（video の上に重ねる） */
    #beauty-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;        /* video(0) の上、気泡(5) の下 */
      pointer-events: none;
      display: none;     /* 美顔ONのときだけ表示 */
    }
    #beauty-canvas.active { display: block; }

    #booth-bubble-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* 美顔コントロール（左下） */
    #beauty-panel {
      position: absolute;
      left: 16px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      font-family: "Noto Sans JP", sans-serif;
    }
    .beauty-toggle {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: rgba(20, 50, 110, 0.78);
      color: #cfe6ff;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
      transition: transform .15s ease, background .15s ease;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }
    .beauty-toggle:hover { transform: scale(1.08); background: rgba(40, 80, 160, 0.9); }
    .beauty-toggle.on { background: rgba(90, 200, 240, 0.9); color: #06243f; }

    .beauty-options {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(12, 30, 64, 0.86);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      width: 248px;
      box-sizing: border-box;
      color: #e6f2ff;
    }
    .beauty-options.open { display: flex; }
    .beauty-options .bp-title {
      font-size: 12px; letter-spacing: .08em; opacity: .7;
    }
    .beauty-row {
      display: flex; align-items: center;
      gap: 10px; font-size: 13px;
    }
    /* ラベルは自然幅・左寄せ。余白を auto で吸収し、スライダー＋値を右に固定 */
    .beauty-row label { white-space: nowrap; margin-right: auto; }
    .beauty-row input[type="range"] {
      flex: none;
      width: 120px;        /* 固定幅 → 0と100の位置が全行で揃う */
      margin: 0;
      accent-color: #5ec8f0;
    }
    .beauty-row .bp-val {
      width: 28px; flex: none; text-align: right;
      font-variant-numeric: tabular-nums; opacity: .85;
    }
    .beauty-shape-note {
      font-size: 11px; line-height: 1.5; opacity: .6;
      min-height: 3.3em;   /* テキスト変化でパネルサイズが動かないよう領域を確保 */
    }
    .beauty-shape-row.disabled { opacity: .35; pointer-events: none; }

    /* 青基調フレーム装飾 */
    #booth-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      border: 14px solid transparent;
      border-image: linear-gradient(135deg,
        #4aa0e8 0%,
        #2a6cc0 25%,
        #5ec8f0 50%,
        #2a6cc0 75%,
        #4aa0e8 100%) 1;
      box-shadow:
        inset 0 0 60px rgba(40, 100, 180, 0.5),
        inset 0 0 120px rgba(20, 60, 140, 0.3);
    }
    /* フレーム四隅の装飾 */
    #booth-frame::before,
    #booth-frame::after {
      content: '';
      position: absolute;
      width: 60px;
      height: 60px;
      border: 3px solid rgba(150, 210, 255, 0.8);
    }
    #booth-frame::before {
      top: 8px; left: 8px;
      border-right: none; border-bottom: none;
      border-radius: 12px 0 0 0;
    }
    #booth-frame::after {
      bottom: 8px; right: 8px;
      border-left: none; border-top: none;
      border-radius: 0 0 12px 0;
    }

    /* 立ち絵 */
    #booth-character {
      position: absolute;
      bottom: 0;
      right: 4%;
      height: 55%;
      max-height: 60vh;
      z-index: 7;
      cursor: grab;
      touch-action: none;
      filter: drop-shadow(0 4px 16px rgba(0, 20, 60, 0.6));
      user-select: none;
      -webkit-user-drag: none;
    }
    #booth-character:active { cursor: grabbing; }

    /* スタンプレイヤー */
    #booth-stamp-layer {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
    }
    .placed-stamp {
      position: absolute;
      pointer-events: auto;
      cursor: grab;
      touch-action: none;
      user-select: none;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5));
    }
    .placed-stamp:active { cursor: grabbing; }
    .placed-stamp img {
      width: 64px;
      height: 64px;
      pointer-events: none;
    }

    /* スタンプパレット */
    #stamp-palette {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 20;
    }
    .stamp-toggle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(20, 40, 80, 0.85);
      border: 1px solid rgba(150, 210, 255, 0.6);
      font-size: 1.5rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .stamp-toggle:hover { transform: scale(1.1); background: rgba(40, 80, 160, 0.9); }
    .stamp-options {
      position: absolute;
      top: 62px;
      right: 0;
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 14px;
      background: rgba(15, 30, 60, 0.95);
      border: 1px solid rgba(150, 210, 255, 0.4);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      width: 150px;
    }
    .stamp-options.open { display: grid; }
    .stamp-pick {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: rgba(40, 70, 130, 0.5);
      border: 1px solid rgba(150, 210, 255, 0.25);
      font-size: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
      padding: 0;
    }
    .stamp-pick:hover { background: rgba(80, 140, 220, 0.6); transform: scale(1.08); }

<div id="camera-error">

    <p id="error-message">カメラへのアクセスが許可されていないか、お使いの端末で利用できない可能性があります。</p>

<script>
(function() {
  // ═══════════════════════════════════════════
  // 1. 部屋の窓に表示する泡を動的生成
  // ═══════════════════════════════════════════
  const preview = document.getElementById('window-preview');
  function spawnPreviewBubble() {
    const b = document.createElement('div');
    b.className = 'preview-bubble';
    const size = 4 + Math.random() * 10;
    const startX = Math.random() * 100;
    const duration = 4 + Math.random() * 4;
    const dx = (Math.random() - 0.5) * 60;
    b.style.cssText = `
      width:${size}px;
      height:${size}px;
      left:${startX}%;
      bottom:-20px;
      --dx:${dx}px;
      animation-duration:${duration}s;
    `;
    preview.appendChild(b);
    setTimeout(() => b.remove(), duration * 1000 + 200);
  }
  setInterval(spawnPreviewBubble, 700);

  // ═══════════════════════════════════════════
  // 2. 窓タップでカメラ起動
  // ═══════════════════════════════════════════
  const windowFrame = document.getElementById('camera-view');
  const cameraView = document.getElementById('camera-view');
  const cameraVideo = document.getElementById('camera-video');
  const errorView = document.getElementById('camera-error');
  const errorMsg = document.getElementById('error-message');

  let currentStream = null;
  let usingFront = false;

  async function startCamera() {
    try {
      // 既存ストリームを停止
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
      }
      const constraints = {
        video: {
          facingMode: usingFront ? 'user' : 'environment',
          width:  { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      currentStream = stream;
      cameraVideo.srcObject = stream;
      cameraView.classList.add('active');
      startBubbles();
    } catch (err) {
      console.error('Camera error:', err);
      if (err.name === 'NotAllowedError') {
        errorMsg.textContent = 'カメラへのアクセスが拒否されました。ブラウザ設定からカメラ許可を有効にしてください。';
      } else if (err.name === 'NotFoundError') {
        errorMsg.textContent = 'カメラデバイスが見つかりません。';
      } else if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        errorMsg.textContent = 'カメラの利用にはHTTPS接続が必要です（GitHub Pages本番環境では動作します）。';
      } else {
        errorMsg.textContent = 'カメラの起動に失敗しました: ' + (err.message || err.name);
      }
      errorView.classList.add('active');
    }
  }

  document.getElementById('window-frame').addEventListener('click', startCamera);

  // ═══════════════════════════════════════════
  // 3. 気泡のCanvas描画
  // ═══════════════════════════════════════════
  const canvas = document.getElementById('bubble-canvas');
  const ctx = canvas.getContext('2d');
  let bubbles = [];
  let bubbleAnimationId = null;

  function resizeCanvas() {
    canvas.width  = window.innerWidth  * window.devicePixelRatio;
    canvas.height = window.innerHeight * window.devicePixelRatio;
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  window.addEventListener('resize', resizeCanvas);

  class Bubble {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * window.innerWidth;
      this.y = window.innerHeight + Math.random() * 100;
      this.r = 2 + Math.random() * 9;
      this.vy = 0.4 + Math.random() * 1.6;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.sway = Math.random() * Math.PI * 2;
      this.opacity = 0.3 + Math.random() * 0.5;
    }
    update() {
      this.y -= this.vy;
      this.sway += 0.02;
      this.x += Math.sin(this.sway) * 0.6 + this.vx;
      if (this.y < -20) this.reset();
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      const grd = ctx.createRadialGradient(
        this.x - this.r*0.3, this.y - this.r*0.3, 0,
        this.x, this.y, this.r
      );
      grd.addColorStop(0,   'rgba(255,255,255,0.95)');
      grd.addColorStop(0.4, 'rgba(200,230,255,0.5)');
      grd.addColorStop(1,   'rgba(150,200,240,0.05)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
      // ハイライト
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.arc(this.x - this.r*0.3, this.y - this.r*0.4, this.r*0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function animateBubbles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    bubbles.forEach(b => { b.update(); b.draw(); });
    bubbleAnimationId = requestAnimationFrame(animateBubbles);
  }

  function startBubbles() {
    resizeCanvas();
    if (bubbles.length === 0) {
      bubbles = Array.from({length: 35}, () => new Bubble());
    }
    if (!bubbleAnimationId) animateBubbles();
  }
  function stopBubbles() {
    if (bubbleAnimationId) {
      cancelAnimationFrame(bubbleAnimationId);
      bubbleAnimationId = null;
    }
  }

  // ═══════════════════════════════════════════
  // 4. 撮影
  // ═══════════════════════════════════════════
  const flash = document.getElementById('camera-flash');
  const photoResult = document.getElementById('photo-result');
  const photoPreview = document.getElementById('photo-canvas-preview');
  const photoDownload = document.getElementById('photo-download');

  document.getElementById('btn-shutter').addEventListener('click', takePhoto);

  // ═══════════════════════════════════════════
  // パーリンノイズ風マップを生成（feTurbulence の代替）
  // ───────────────────────────────────────────
  function generateNoiseMap(w, h, scaleX, scaleY, seed) {
    // 簡易バリューノイズ。完全なパーリンほどでないが揺らぎとしては十分。
    const noise = new Float32Array(w * h);
    const grid = [];
    const gridW = Math.ceil(w * scaleX) + 2;
    const gridH = Math.ceil(h * scaleY) + 2;
    let s = seed;
    const rand = () => {
      // 簡易疑似乱数 (xorshift)
      s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
      return ((s >>> 0) / 0xffffffff);
    };
    for (let i = 0; i < gridW * gridH; i++) grid.push(rand());
    const cubic = (t) => t * t * (3 - 2 * t);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const gx = x * scaleX;
        const gy = y * scaleY;
        const x0 = Math.floor(gx), y0 = Math.floor(gy);
        const x1 = x0 + 1,         y1 = y0 + 1;
        const fx = cubic(gx - x0), fy = cubic(gy - y0);
        const v00 = grid[y0 * gridW + x0] || 0;
        const v10 = grid[y0 * gridW + x1] || 0;
        const v01 = grid[y1 * gridW + x0] || 0;
        const v11 = grid[y1 * gridW + x1] || 0;
        const top = v00 * (1 - fx) + v10 * fx;
        const bot = v01 * (1 - fx) + v11 * fx;
        noise[y * w + x] = top * (1 - fy) + bot * fy;
      }
    }
    return noise;
  }

  // ピクセル単位の displacement 処理（feDisplacementMap の代替）
  // src の各ピクセルを noiseX/noiseY に従って ±scale 分ずらして dst に描画
  function applyDisplacement(srcImageData, noiseMapX, noiseMapY, scale) {
    const w = srcImageData.width;
    const h = srcImageData.height;
    const src = srcImageData.data;
    const dst = new Uint8ClampedArray(src.length);

    // バイリニア補間でサンプリング（サブピクセルのずらしも滑らかに反映）
    function sample(fx, fy, ch) {
      if (fx < 0) fx = 0; else if (fx > w - 1) fx = w - 1;
      if (fy < 0) fy = 0; else if (fy > h - 1) fy = h - 1;
      const x0 = Math.floor(fx), y0 = Math.floor(fy);
      const x1 = Math.min(x0 + 1, w - 1), y1 = Math.min(y0 + 1, h - 1);
      const tx = fx - x0, ty = fy - y0;
      const i00 = (y0 * w + x0) * 4 + ch;
      const i10 = (y0 * w + x1) * 4 + ch;
      const i01 = (y1 * w + x0) * 4 + ch;
      const i11 = (y1 * w + x1) * 4 + ch;
      const top = src[i00] * (1 - tx) + src[i10] * tx;
      const bot = src[i01] * (1 - tx) + src[i11] * tx;
      return top * (1 - ty) + bot * ty;
    }

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const idx = y * w + x;
        // ノイズは0〜1。-0.5〜0.5に変換し、振れ幅を広げて(×2)、scale倍
        const dx = (noiseMapX[idx] - 0.5) * 2 * scale;
        const dy = (noiseMapY[idx] - 0.5) * 2 * scale;
        const srcX = x + dx;
        const srcY = y + dy;
        const dstIdx = idx * 4;
        dst[dstIdx]     = sample(srcX, srcY, 0);
        dst[dstIdx + 1] = sample(srcX, srcY, 1);
        dst[dstIdx + 2] = sample(srcX, srcY, 2);
        dst[dstIdx + 3] = sample(srcX, srcY, 3);
      }
    }
    return new ImageData(dst, w, h);
  }

  function takePhoto() {
    if (!cameraVideo.videoWidth) return;
    flash.classList.remove('flash');
    void flash.offsetWidth; // reflow
    flash.classList.add('flash');

    // 処理中インジケータを表示
    const processing = document.getElementById('processing-indicator');
    processing.classList.add('active');

    // 処理を少し遅延させて、フラッシュとインジケータを描画
    setTimeout(() => {
      // ───────────────────────────────────────────
      // 出力サイズ。歪み処理が重いので、画面サイズベース
      // で抑えめに（モバイルでも実用速度を確保）
      // ───────────────────────────────────────────
      const dpr = Math.min(window.devicePixelRatio || 1, 2); // dprは2まで
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;
      const W = Math.round(screenW * dpr);
      const H = Math.round(screenH * dpr);

      // ───────────────────────────────────────────
      // ステップ1: カメラ映像をCanvasに描画（CSS filter込み）
      // ───────────────────────────────────────────
      const baseCanvas = document.createElement('canvas');
      baseCanvas.width = W;
      baseCanvas.height = H;
      const bc = baseCanvas.getContext('2d');

      const vw = cameraVideo.videoWidth;
      const vh = cameraVideo.videoHeight;
      const videoRatio  = vw / vh;
      const screenRatio = W / H;
      let sx, sy, sw, sh;
      if (videoRatio > screenRatio) {
        sh = vh;
        sw = vh * screenRatio;
        sx = (vw - sw) / 2;
        sy = 0;
      } else {
        sw = vw;
        sh = vw / screenRatio;
        sx = 0;
        sy = (vh - sh) / 2;
      }
      bc.filter = 'hue-rotate(180deg) saturate(1.4) contrast(1.05) brightness(0.85)';
      bc.drawImage(cameraVideo, sx, sy, sw, sh, 0, 0, W, H);
      bc.filter = 'none';

      // ───────────────────────────────────────────
      // ステップ2: 歪み処理 (feDisplacementMap 相当)
      // ───────────────────────────────────────────
      // 元のSVG: baseFrequency="0.012 0.025" → 水平より垂直方向の周波数が高い
      // 歪みの強さ（バイリニア補間版。3前後が「7の半分」相当の自然な揺らぎ）
      const distortScale = 3 * dpr;
      // 周波数 → scaleの逆数 (baseFrequency=0.012 は周期約83px相当)
      const baseFreqX = 0.012;
      const baseFreqY = 0.025;
      const seed = 3;
      const noiseX = generateNoiseMap(W, H, baseFreqX, baseFreqY, seed);
      const noiseY = generateNoiseMap(W, H, baseFreqX, baseFreqY, seed * 7 + 1);

      const srcData = bc.getImageData(0, 0, W, H);
      const distorted = applyDisplacement(srcData, noiseX, noiseY, distortScale);

      // 歪み結果を別Canvasに書き戻す
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const ctxF = c.getContext('2d');
      ctxF.putImageData(distorted, 0, 0);

      // ───────────────────────────────────────────
      // ステップ3: エフェクトレイヤーを重ねる
      // (画面のオーバーレイと同じ構成)
      // ───────────────────────────────────────────

      // 青tint
      ctxF.globalCompositeOperation = 'multiply';
      const grdBlue = ctxF.createLinearGradient(0, 0, 0, H);
      grdBlue.addColorStop(0,   'rgba(40, 120, 200, 0.2)');
      grdBlue.addColorStop(0.6, 'rgba(20, 60, 140, 0.35)');
      grdBlue.addColorStop(1,   'rgba(10, 30, 80, 0.55)');
      ctxF.fillStyle = grdBlue;
      ctxF.fillRect(0, 0, W, H);

      const grdGlow = ctxF.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, Math.max(W, H) * 0.6);
      grdGlow.addColorStop(0,   'rgba(120, 200, 255, 0.15)');
      grdGlow.addColorStop(1,   'rgba(120, 200, 255, 0)');
      ctxF.fillStyle = grdGlow;
      ctxF.fillRect(0, 0, W, H);

      // コースティクス (光の差し込み)
      ctxF.globalCompositeOperation = 'screen';
      ctxF.save();
      const stripeSpacing = 120 * dpr;
      const stripeWidth = 30 * dpr;
      ctxF.translate(W/2, H/2);
      ctxF.rotate((115 - 90) * Math.PI / 180);
      const diag = Math.hypot(W, H);
      const t = (performance.now() / 8000) % 1;
      const offset = -t * stripeSpacing;
      for (let x = -diag; x < diag; x += stripeSpacing) {
        const grdStripe = ctxF.createLinearGradient(x + offset, 0, x + offset + stripeWidth, 0);
        grdStripe.addColorStop(0,   'rgba(180, 220, 255, 0)');
        grdStripe.addColorStop(0.5, 'rgba(180, 220, 255, 0.08)');
        grdStripe.addColorStop(1,   'rgba(180, 220, 255, 0)');
        ctxF.fillStyle = grdStripe;
        ctxF.fillRect(x + offset, -diag, stripeWidth, diag * 2);
      }
      ctxF.restore();

      // 気泡
      ctxF.globalCompositeOperation = 'source-over';
      bubbles.forEach(b => {
        const sxB = b.x * dpr;
        const syB = b.y * dpr;
        const srB = b.r * dpr;
        if (sxB < -srB || sxB > W + srB || syB < -srB || syB > H + srB) return;
        ctxF.save();
        ctxF.globalAlpha = b.opacity;
        const grd = ctxF.createRadialGradient(
          sxB - srB*0.3, syB - srB*0.3, 0,
          sxB, syB, srB
        );
        grd.addColorStop(0,   'rgba(255,255,255,0.95)');
        grd.addColorStop(0.4, 'rgba(200,230,255,0.5)');
        grd.addColorStop(1,   'rgba(150,200,240,0.05)');
        ctxF.fillStyle = grd;
        ctxF.beginPath();
        ctxF.arc(sxB, syB, srB, 0, Math.PI * 2);
        ctxF.fill();
        ctxF.fillStyle = 'rgba(255,255,255,0.7)';
        ctxF.beginPath();
        ctxF.arc(sxB - srB*0.3, syB - srB*0.4, srB*0.25, 0, Math.PI * 2);
        ctxF.fill();
        ctxF.restore();
      });

      // ビネット
      const grdVig = ctxF.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.hypot(W, H) * 0.55);
      grdVig.addColorStop(0,   'rgba(0, 0, 0, 0)');
      grdVig.addColorStop(0.5, 'rgba(0, 0, 0, 0)');
      grdVig.addColorStop(0.8, 'rgba(0, 10, 40, 0.4)');
      grdVig.addColorStop(1,   'rgba(0, 5, 20, 0.8)');
      ctxF.fillStyle = grdVig;
      ctxF.fillRect(0, 0, W, H);

      // 窓マスク
      const grdMask = ctxF.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.hypot(W, H) * 0.5);
      grdMask.addColorStop(0,    'rgba(0, 5, 20, 0)');
      grdMask.addColorStop(0.45, 'rgba(0, 5, 20, 0)');
      grdMask.addColorStop(0.7,  'rgba(0, 5, 20, 0.6)');
      grdMask.addColorStop(1,    'rgba(0, 5, 20, 0.95)');
      ctxF.fillStyle = grdMask;
      ctxF.fillRect(0, 0, W, H);

      // 完成画像
      const dataUrl = c.toDataURL('image/png');
      photoPreview.src = dataUrl;
      photoDownload.href = dataUrl;
      // シェア用にBlobも保存
      c.toBlob(blob => { lastPhotoBlob = blob; }, 'image/png');

      processing.classList.remove('active');
      photoResult.classList.add('active');
    }, 250);
  }

  // 直近の撮影画像（シェア用）
  let lastPhotoBlob = null;

  // ═══════════════════════════════════════════
  // 5. その他UI操作
  // ═══════════════════════════════════════════
  document.getElementById('btn-close').addEventListener('click', closeCamera);
  document.getElementById('btn-switch').addEventListener('click', () => {
    usingFront = !usingFront;
    startCamera();
  });
  document.getElementById('photo-close').addEventListener('click', () => {
    photoResult.classList.remove('active');
    closeCamera();
  });
  document.getElementById('photo-retake').addEventListener('click', () => {
    photoResult.classList.remove('active');
  });
  document.getElementById('error-close').addEventListener('click', () => {
    errorView.classList.remove('active');
  });

  // ─── Xシェア ───
  // Web Share API (Level 2) で画像付き共有を試行、ダメならintent URL
  document.getElementById('photo-share').addEventListener('click', async () => {
    const shareText = '#きみ夏宵あそび';
    const shareUrl  = location.href;

    // Web Share API 経由（モバイルで対応）
    if (lastPhotoBlob && navigator.canShare) {
      const file = new File([lastPhotoBlob], 'mare-room.png', { type: 'image/png' });
      const shareData = { files: [file], text: shareText, url: shareUrl };
      if (navigator.canShare(shareData)) {

          await navigator.share(shareData);
          return;
        } catch (err) {
          // ユーザーがキャンセル等。ダイアログ閉じるだけ。
          if (err.name === 'AbortError') return;
          console.warn('share failed, fallback to intent', err);
        }
      }
    }

    // フォールバック: X intent URL (テキストのみ)
    // 画像は別途ダウンロード→手動添付してもらう
    const intentUrl = 'https://twitter.com/intent/tweet?text=' +
      encodeURIComponent(shareText + '\n' + shareUrl);
    window.open(intentUrl, '_blank', 'noopener');
    // 画像添付ガイドのアラート
    alert('Xの投稿画面が開きます。画像は自動添付されないため、お手数ですが「ダウンロード」した画像を投稿時にご自身で添付してください。');
  });

  function closeCamera() {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    cameraView.classList.remove('active');
    stopBubbles();
  }

  // ═══════════════════════════════════════════
  // 6. PHOTO BOOTH (通常カメラ + 立ち絵 + スタンプ)
  // ═══════════════════════════════════════════
  const boothView   = document.getElementById('booth-view');
  const boothVideo  = document.getElementById('booth-video');
  const boothChar   = document.getElementById('booth-character');
  const stampLayer  = document.getElementById('booth-stamp-layer');
  const boothFlash  = document.getElementById('booth-flash');
  const boothCanvas = document.getElementById('booth-bubble-canvas');
  const boothCtx    = boothCanvas.getContext('2d');

  let boothStream = null;
  let boothFront = false;
  let boothBubbles = [];
  let boothBubbleId = null;

  // ═══════════════════════════════════════════
  // 6.5 美顔エンジン（MediaPipe FaceLandmarker ベース）
  //   - 肌なめらか化: 縮小ブラー × 元映像のソフト合成（顔検出不要）
  //   - 明るさ / 血色: 軽い色調補正（顔検出不要）
  //   - デカ目 / 小顔: 468点ランドマークでローカルワープ
  //     ※ WASM/モデルは同一オリジン（GitHub Pages）から読み込む
  // ═══════════════════════════════════════════

  // 自前ホスト用パス（リポジトリ内に配置：下記READMEの手順参照）
  const MP_WASM_PATH  = 'assets/mediapipe/wasm';
  const MP_MODEL_PATH = 'assets/mediapipe/face_landmarker.task';
  const MP_BUNDLE_URL = 'assets/mediapipe/vision_bundle.mjs';

  const beautyCanvas = document.getElementById('beauty-canvas');

  // 美顔パラメータ（0〜1に正規化して保持）
  const beauty = {
    enabled: false,
    smooth: 0.55,   // なめらか肌
    bright: 0.35,   // 明るさ
    warm:   0.30,   // 血色
    eye:    0.0,    // デカ目
    slim:   0.0,    // 小顔
  };

  // 補正が有効か＝いずれかのスライダーが0より大きい
  function beautyActive() {
    return beauty.smooth > 0.001 || beauty.bright > 0.001 || beauty.warm > 0.001
        || beauty.eye   > 0.001 || beauty.slim  > 0.001;
  }

  // 作業用オフスクリーン
  const workFull  = document.createElement('canvas'); // 等倍合成用
  const workCtx   = workFull.getContext('2d', { willReadFrequently: true });
  const workSmall = document.createElement('canvas'); // 縮小ブラー用
  const workSmCtx = workSmall.getContext('2d');

  // ─── MediaPipe FaceLandmarker（遅延ロード） ───
  let faceLandmarker = null;
  let faceReady   = false;   // モデルのロード完了
  let faceLoading = false;
  let faceFailed  = false;
  let lastResult  = null;    // 直近の検出結果（landmarks配列）

  async function ensureFaceLandmarker() {
    if (faceReady || faceLoading || faceFailed) return;
    faceLoading = true;
    bpShapeNote.textContent = '※ 顔認識を読み込み中…';
    try {
      const vision = await import(new URL(MP_BUNDLE_URL, document.baseURI).href);
      const { FaceLandmarker, FilesetResolver } = vision;
      const resolver = await FilesetResolver.forVisionTasks(new URL(MP_WASM_PATH, document.baseURI).href);
      faceLandmarker = await FaceLandmarker.createFromOptions(resolver, {
        baseOptions: { modelAssetPath: new URL(MP_MODEL_PATH, document.baseURI).href, delegate: 'GPU' },
        runningMode: 'VIDEO',
        numFaces: 2,
        // 虹彩点（468〜477）を有効化して目の中心精度を上げる
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: false,
      });
      faceReady = true;
      bpShapeNote.textContent = '※ 補正は撮影時に適用されます';
    } catch (e) {
      console.error('FaceLandmarker load failed:', e);
      faceFailed = true;
      bpShapeNote.textContent = '※ 顔認識の読み込みに失敗しました（肌補正のみ動作）';
      document.getElementById('bp-eye-row').classList.add('disabled');
      document.getElementById('bp-slim-row').classList.add('disabled');
    } finally {
      faceLoading = false;
    }
  }

  let beautyRAF = null;

  // 直近の cover パラメータ（変形で座標変換に使う）
  let _cover = { sx:0, sy:0, sw:0, sh:0, dw:0, dh:0 };

  // メイン処理：source を beauty 補正して dstCtx の (0,0,dw,dh) に描く
  function applyBeauty(source, srcW, srcH, dstCtx, dw, dh) {
    const sr = dw / dh, vr = srcW / srcH;
    let sx, sy, sw, sh;
    if (vr > sr) { sh = srcH; sw = srcH * sr; sx = (srcW - sw) / 2; sy = 0; }
    else         { sw = srcW; sh = srcW / sr; sx = 0; sy = (srcH - sh) / 2; }
    _cover = { sx, sy, sw, sh, dw, dh };

    if (workFull.width !== dw || workFull.height !== dh) {
      workFull.width = dw; workFull.height = dh;
    }
    workCtx.setTransform(1, 0, 0, 1, 0, 0);

    // 1) 肌なめらか化（縮小ブラーをソフトに重ねる）
    if (beauty.smooth > 0.001) {
      const scale = 0.28;
      const bw = Math.max(2, Math.round(dw * scale));
      const bh = Math.max(2, Math.round(dh * scale));
      if (workSmall.width !== bw || workSmall.height !== bh) {
        workSmall.width = bw; workSmall.height = bh;
      }
      workSmCtx.setTransform(1, 0, 0, 1, 0, 0);
      workSmCtx.imageSmoothingEnabled = true;
      workSmCtx.drawImage(source, sx, sy, sw, sh, 0, 0, bw, bh);

      workCtx.globalAlpha = 1;
      workCtx.globalCompositeOperation = 'source-over';
      workCtx.imageSmoothingEnabled = true;
      workCtx.drawImage(source, sx, sy, sw, sh, 0, 0, dw, dh);

      workCtx.globalAlpha = 0.35 + beauty.smooth * 0.5;  // 0.35〜0.85
      workCtx.drawImage(workSmall, 0, 0, bw, bh, 0, 0, dw, dh);
      workCtx.globalAlpha = 1;
    } else {
      workCtx.globalAlpha = 1;
      workCtx.globalCompositeOperation = 'source-over';
      workCtx.imageSmoothingEnabled = true;
      workCtx.drawImage(source, sx, sy, sw, sh, 0, 0, dw, dh);
    }

    // 2) 明るさ / 血色
    if (beauty.bright > 0.001) {
      workCtx.save();
      workCtx.globalCompositeOperation = 'lighten';
      workCtx.globalAlpha = beauty.bright * 0.22;
      workCtx.fillStyle = '#ffffff';
      workCtx.fillRect(0, 0, dw, dh);
      workCtx.restore();
    }
    if (beauty.warm > 0.001) {
      workCtx.save();
      workCtx.globalCompositeOperation = 'overlay';
      workCtx.globalAlpha = beauty.warm * 0.20;
      workCtx.fillStyle = '#ff8a6e';
      workCtx.fillRect(0, 0, dw, dh);
      workCtx.restore();
    }

    // 3) デカ目 / 小顔（ランドマーク取得時のみ）
    if (faceReady && lastResult && lastResult.faceLandmarks &&
        (beauty.eye > 0.001 || beauty.slim > 0.001)) {
      try {
        lastResult.faceLandmarks.forEach(lm => {
          if (beauty.slim > 0.001) warpSlim(workCtx, lm, beauty.slim);
          if (beauty.eye  > 0.001) warpEyes(workCtx, lm, beauty.eye);
        });
      } catch (e) {
        // 変形が失敗しても素の映像は必ず残す（＋原因を画面に出す）
        console.warn('warp skipped:', e);
        try { bpShapeNote.textContent = '⚠ 変形スキップ: ' + (e && e.message ? e.message : e); } catch (_) {}
      }
    }

    dstCtx.drawImage(workFull, 0, 0, dw, dh);
  }

  // 正規化ランドマーク(0〜1) → workFull(dst) のピクセル座標へ
  function lmToPx(p) {
    const { sx, sy, sw, sh, dw, dh } = _cover;
    // ランドマークは「映像フレーム全体」基準。cover で切り出した分を補正
    const fx = p.x * (workFull._srcW || 1);   // 後で _srcW を渡す
    const fy = p.y * (workFull._srcH || 1);
    return {
      x: (fx - sx) * (dw / sw),
      y: (fy - sy) * (dh / sh),
    };
  }

  // デカ目：左右の虹彩中心を放射状に拡大
  // MediaPipe(refine無し)では虹彩点が無い場合があるため、目輪郭の重心を使う
  // 右目輪郭: 33,133,159,145 / 左目輪郭: 362,263,386,374
  const R_EYE = [33, 133, 159, 145];
  const L_EYE = [362, 263, 386, 374];
  function eyeCenter(lm, idxs) {
    let x = 0, y = 0;
    idxs.forEach(i => { x += lm[i].x; y += lm[i].y; });
    return { x: x / idxs.length, y: y / idxs.length };
  }
  function eyeWidthPx(lm, a, b) {
    const pa = lmToPx(lm[a]), pb = lmToPx(lm[b]);
    return Math.hypot(pa.x - pb.x, pa.y - pb.y);
  }
  // ── バイリニア・サンプリング（src ImageData の (x,y) を out[oi..] に） ──
  function sampleBilinear(src, sw, sh, x, y, out, oi) {
    if (x < 0) x = 0; else if (x > sw - 1) x = sw - 1;
    if (y < 0) y = 0; else if (y > sh - 1) y = sh - 1;
    const x0 = x | 0, y0 = y | 0;
    const x1 = x0 + 1 < sw ? x0 + 1 : x0;
    const y1 = y0 + 1 < sh ? y0 + 1 : y0;
    const fx = x - x0, fy = y - y0;
    const i00 = (y0*sw + x0)*4, i10 = (y0*sw + x1)*4;
    const i01 = (y1*sw + x0)*4, i11 = (y1*sw + x1)*4;
    for (let c = 0; c < 4; c++) {
      const top = src[i00+c]*(1-fx) + src[i10+c]*fx;
      const bot = src[i01+c]*(1-fx) + src[i11+c]*fx;
      out[oi+c] = top*(1-fy) + bot*fy;
    }
  }
  function smoothstep(a, b, x) {
    if (b === a) return x < a ? 0 : 1;
    let t = (x - a) / (b - a);
    t = t < 0 ? 0 : t > 1 ? 1 : t;
    return t*t*(3 - 2*t);
  }

  // ── 円形バルジ（中心ほど拡大、縁でなめらかに0：リング段差なし） ──
  function bulgeRegion(ctx, cx, cy, R, strength) {
    if (!isFinite(cx) || !isFinite(cy) || !isFinite(R) || R < 1) return;
    const cw = ctx.canvas.width, ch = ctx.canvas.height;
    const x0 = Math.max(0, Math.floor(cx - R)), y0 = Math.max(0, Math.floor(cy - R));
    const x1 = Math.min(cw, Math.ceil(cx + R)), y1 = Math.min(ch, Math.ceil(cy + R));
    const w = x1 - x0, h = y1 - y0;
    if (!(w >= 3) || !(h >= 3)) return;   // NaN も弾く
    const sd = ctx.getImageData(x0, y0, w, h).data;
    const dst = ctx.createImageData(w, h), dd = dst.data;
    const lcx = cx - x0, lcy = cy - y0;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const oi = (y*w + x)*4;
        const dx = x - lcx, dy = y - lcy;
        const d = Math.hypot(dx, dy);
        if (d >= R || d === 0) { dd[oi]=sd[oi];dd[oi+1]=sd[oi+1];dd[oi+2]=sd[oi+2];dd[oi+3]=sd[oi+3]; continue; }
        const r = d / R;
        // 縁で1・中心で(1-strength)。(1-r)^2で導関数も0→段差が出ない
        const factor = 1 - strength * (1 - r) * (1 - r);
        sampleBilinear(sd, w, h, lcx + dx*factor, lcy + dy*factor, dd, oi);
      }
    }
    ctx.putImageData(dst, x0, y0);
  }

  // ── デカ目 ──
  function warpEyes(ctx, lm, amount) {
    [[R_EYE, 33, 133], [L_EYE, 362, 263]].forEach(([idxs, a, b]) => {
      const c = lmToPx(eyeCenter(lm, idxs));
      const eyeW = eyeWidthPx(lm, a, b);
      const R = Math.max(20, eyeW * 1.8);          // 影響半径：目幅の約1.8倍
      bulgeRegion(ctx, c.x, c.y, R, amount * 0.30); // 中心の引き込み量（最大0.30）
    });
  }

  // ── 小顔（中心線へ横圧縮、上下左右になめらか減衰） ──
  function warpSlim(ctx, lm, amount) {
    const cw = ctx.canvas.width, ch = ctx.canvas.height;
    const left = lmToPx(lm[234]), right = lmToPx(lm[454]);
    const chin = lmToPx(lm[152]),  fore  = lmToPx(lm[10]);
    const cx = (left.x + right.x) / 2;
    const faceW = Math.abs(right.x - left.x);
    if (faceW < 8) return;
    const half = faceW * 0.62;            // 横の影響範囲（顔幅より少し広く）
    const strength = amount * 0.16;       // 最大16%内側へ
    const bandTop = fore.y + (chin.y - fore.y) * 0.28;
    const bandBot = chin.y + faceW * 0.12;
    const yPad = (bandBot - bandTop) * 0.55;  // 上下フェード幅

    const x0 = Math.max(0, Math.floor(cx - half)), x1 = Math.min(cw, Math.ceil(cx + half));
    const y0 = Math.max(0, Math.floor(bandTop - yPad)), y1 = Math.min(ch, Math.ceil(bandBot + yPad));
    const w = x1 - x0, h = y1 - y0;
    if (!isFinite(cx) || !isFinite(half) || half < 1) return;
    if (!(w >= 3) || !(h >= 3)) return;   // NaN も弾く
    const sd = ctx.getImageData(x0, y0, w, h).data;
    const dst = ctx.createImageData(w, h), dd = dst.data;
    const lcx = cx - x0;
    for (let y = 0; y < h; y++) {
      const gy = y + y0;
      let wy;                              // 縦の重み（バンド内1、外で0へ）
      if (gy < bandTop)      wy = smoothstep(bandTop - yPad, bandTop, gy);
      else if (gy > bandBot) wy = 1 - smoothstep(bandBot, bandBot + yPad, gy);
      else                   wy = 1;
      for (let x = 0; x < w; x++) {
        const oi = (y*w + x)*4;
        const nx = (x - lcx) / half;       // -1..1
        const wx = Math.max(0, 1 - nx*nx); // 横の重み（中心1・端0）
        const s = strength * wy * wx;
        if (s <= 0.0005) { dd[oi]=sd[oi];dd[oi+1]=sd[oi+1];dd[oi+2]=sd[oi+2];dd[oi+3]=sd[oi+3]; continue; }
        // 内に寄せる＝外側からサンプリング
        sampleBilinear(sd, w, h, lcx + (x - lcx) / (1 - s), y, dd, oi);
      }
    }
    ctx.putImageData(dst, x0, y0);
  }

  // リアルタイムプレビュー用ループ
  function beautyLoop() {
    if (beauty.enabled && boothVideo.videoWidth) {
      const dw = beautyCanvas.clientWidth  || window.innerWidth;
      const dh = beautyCanvas.clientHeight || window.innerHeight;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const W = Math.round(dw * dpr), H = Math.round(dh * dpr);
      if (beautyCanvas.width !== W || beautyCanvas.height !== H) {
        beautyCanvas.width = W; beautyCanvas.height = H;
      }
      // 変形ONなら顔検出（VIDEOモードは内部でフレーム間引き最適化される）
      if (faceReady && (beauty.eye > 0.001 || beauty.slim > 0.001)) {
        try {
          lastResult = faceLandmarker.detectForVideo(boothVideo, performance.now());
        } catch (e) { /* フレームスキップ */ }
      }
      // ランドマークのスケール基準を保存
      workFull._srcW = boothVideo.videoWidth;
      workFull._srcH = boothVideo.videoHeight;
      const ctx = beautyCanvas.getContext('2d');
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      applyBeauty(boothVideo, boothVideo.videoWidth, boothVideo.videoHeight, ctx, W, H);
    }
    beautyRAF = requestAnimationFrame(beautyLoop);
  }
  function startBeautyLoop() { if (!beautyRAF) beautyLoop(); }
  function stopBeautyLoop() { if (beautyRAF) { cancelAnimationFrame(beautyRAF); beautyRAF = null; } }

  // ─── 美顔UI ───
  const beautyToggle  = document.getElementById('beauty-toggle');
  const beautyOptions = document.getElementById('beauty-options');
  const bpShapeNote   = document.getElementById('bp-shape-note');
  bpShapeNote.textContent = '※ 補正は撮影時に適用されます（プレビューは素のままです）';

  function bindSlider(id, key) {
    const el  = document.getElementById(id);
    const val = document.getElementById(id + '-val');
    el.addEventListener('input', () => {
      beauty[key] = el.value / 100;
      val.textContent = el.value;
      beautyToggle.classList.toggle('on', beautyActive());  // 補正が効く状態なら点灯
      // 変形系を初めて動かすタイミングでモデルを遅延ロード
      if ((key === 'eye' || key === 'slim') && beauty[key] > 0.001) {
        ensureFaceLandmarker();
      }
    });
  }
  bindSlider('bp-smooth', 'smooth');
  bindSlider('bp-bright', 'bright');
  bindSlider('bp-warm',   'warm');
  bindSlider('bp-eye',    'eye');
  bindSlider('bp-slim',   'slim');
  beautyToggle.classList.toggle('on', beautyActive());  // 初期点灯

  // ✨＝パネルの開閉のみ。補正ON/OFFはスライダー値で決まる
  beautyToggle.addEventListener('click', () => {
    beautyOptions.classList.toggle('open');
  });

  // パネルの外（#beauty-panel 以外）をタップしたら閉じる
  document.addEventListener('pointerdown', (e) => {
    if (beautyOptions.classList.contains('open') && !e.target.closest('#beauty-panel')) {
      beautyOptions.classList.remove('open');
    }
  }, true);

  // 気泡（カメラビューと同じBubbleクラスをboothCtx用に複製）
  class BoothBubble {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * window.innerWidth;
      this.y = window.innerHeight + Math.random() * 100;
      this.r = 2 + Math.random() * 9;
      this.vy = 0.4 + Math.random() * 1.6;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.sway = Math.random() * Math.PI * 2;
      this.opacity = 0.3 + Math.random() * 0.5;
    }
    update() {
      this.y -= this.vy;
      this.sway += 0.02;
      this.x += Math.sin(this.sway) * 0.6 + this.vx;
      if (this.y < -20) this.reset();
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      const grd = ctx.createRadialGradient(this.x - this.r*0.3, this.y - this.r*0.3, 0, this.x, this.y, this.r);
      grd.addColorStop(0,   'rgba(255,255,255,0.95)');
      grd.addColorStop(0.4, 'rgba(200,230,255,0.5)');
      grd.addColorStop(1,   'rgba(150,200,240,0.05)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.arc(this.x - this.r*0.3, this.y - this.r*0.4, this.r*0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
  function resizeBoothCanvas() {
    boothCanvas.width  = window.innerWidth  * window.devicePixelRatio;
    boothCanvas.height = window.innerHeight * window.devicePixelRatio;
    boothCanvas.style.width  = window.innerWidth + 'px';
    boothCanvas.style.height = window.innerHeight + 'px';
    boothCtx.setTransform(1,0,0,1,0,0);
    boothCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  function animateBoothBubbles() {
    boothCtx.clearRect(0, 0, boothCanvas.width, boothCanvas.height);
    boothBubbles.forEach(b => { b.update(); b.draw(boothCtx); });
    boothBubbleId = requestAnimationFrame(animateBoothBubbles);
  }
  function startBoothBubbles() {
    resizeBoothCanvas();
    if (boothBubbles.length === 0) boothBubbles = Array.from({length: 28}, () => new BoothBubble());
    if (!boothBubbleId) animateBoothBubbles();
  }
  function stopBoothBubbles() {
    if (boothBubbleId) { cancelAnimationFrame(boothBubbleId); boothBubbleId = null; }
  }

  async function startBooth() {
    try {
      if (boothStream) boothStream.getTracks().forEach(t => t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: boothFront ? 'user' : 'environment', width:{ideal:1920}, height:{ideal:1080} },
        audio: false
      });
      boothStream = stream;
      boothVideo.srcObject = stream;
      boothView.classList.add('active');
      startBoothBubbles();
    } catch (err) {
      console.error('Booth camera error:', err);
      if (err.name === 'NotAllowedError') {
        errorMsg.textContent = 'カメラへのアクセスが拒否されました。ブラウザ設定からカメラ許可を有効にしてください。';
      } else {
        errorMsg.textContent = 'カメラの起動に失敗しました: ' + (err.message || err.name);
      }
      errorView.classList.add('active');
    }
  }
  function closeBooth() {
    if (boothStream) { boothStream.getTracks().forEach(t => t.stop()); boothStream = null; }
    boothView.classList.remove('active');
    stopBoothBubbles();
    stopBeautyLoop();
  }

  document.getElementById('photo-panel-entry').addEventListener('click', startBooth);
  document.getElementById('booth-close').addEventListener('click', closeBooth);
  document.getElementById('booth-switch').addEventListener('click', () => { boothFront = !boothFront; startBooth(); });

  // ─── ドラッグ移動（立ち絵・スタンプ共通） ───
  function makeDraggable(el) {
    let dragging = false, offsetX = 0, offsetY = 0;
    function onDown(e) {
      dragging = true;
      const pt = e.touches ? e.touches[0] : e;
      const rect = el.getBoundingClientRect();
      // 中心基準のtransformを考慮
      if (el.classList.contains('placed-stamp')) {
        offsetX = pt.clientX - (rect.left + rect.width/2);
        offsetY = pt.clientY - (rect.top + rect.height/2);
      } else {
        offsetX = pt.clientX - rect.left;
        offsetY = pt.clientY - rect.top;
      }
      el.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      const pt = e.touches ? e.touches[0] : e;
      if (el.classList.contains('placed-stamp')) {
        el.style.left = (pt.clientX - offsetX) + 'px';
        el.style.top  = (pt.clientY - offsetY) + 'px';
      } else {
        // 立ち絵は right/bottom 基準をやめて left/top で扱う
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        el.style.left = (pt.clientX - offsetX) + 'px';
        el.style.top  = (pt.clientY - offsetY) + 'px';
      }
      e.preventDefault();
    }
    function onUp() { dragging = false; el.style.cursor = 'grab'; }
    el.addEventListener('mousedown', onDown);
    el.addEventListener('touchstart', onDown, { passive: false });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);
  }
  makeDraggable(boothChar);

  // ─── スタンプパレット ───
  const stampToggle  = document.getElementById('stamp-toggle');
  const stampOptions = document.getElementById('stamp-options');
  stampToggle.addEventListener('click', () => stampOptions.classList.toggle('open'));

  document.querySelectorAll('.stamp-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.type;
      const val  = btn.dataset.val;
      const stamp = document.createElement('div');
      stamp.className = 'placed-stamp';
      // 画面中央に出す
      stamp.style.left = '50%';
      stamp.style.top  = '45%';
      if (type === 'emoji') {
        stamp.textContent = val;
      } else {
        const img = document.createElement('img');
        img.src = val;
        stamp.appendChild(img);
      }
      // ダブルタップ/ダブルクリックで削除
      let lastTap = 0;
      const removeHandler = () => stamp.remove();
      stamp.addEventListener('dblclick', removeHandler);
      stamp.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) { removeHandler(); }
        lastTap = now;
      });
      stampLayer.appendChild(stamp);
      makeDraggable(stamp);
      stampOptions.classList.remove('open');
    });
  });

  // ─── フォトブース撮影 ───
  document.getElementById('booth-shutter').addEventListener('click', takeBoothPhoto);

  function takeBoothPhoto() {
    if (!boothVideo.videoWidth) return;
    boothFlash.classList.remove('flash');
    void boothFlash.offsetWidth;
    boothFlash.classList.add('flash');

    setTimeout(async () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const W = Math.round(window.innerWidth * dpr);
      const H = Math.round(window.innerHeight * dpr);
      const out = document.createElement('canvas');
      out.width = W; out.height = H;
      const c = out.getContext('2d');

      // 1) カメラ映像 (cover) ── 美顔ONなら補正を通す
      const vw = boothVideo.videoWidth, vh = boothVideo.videoHeight;
      if (beautyActive()) {
        // 撮影直前に変形系がONなら確実に1回検出
        if (faceReady && (beauty.eye > 0.001 || beauty.slim > 0.001)) {
          try { lastResult = faceLandmarker.detectForVideo(boothVideo, performance.now()); }
          catch { /* スキップ */ }
        }
        workFull._srcW = vw; workFull._srcH = vh;
        applyBeauty(boothVideo, vw, vh, c, W, H);
      } else {
        const vr = vw / vh, sr = W / H;
        let sx, sy, sw, sh;
        if (vr > sr) { sh = vh; sw = vh * sr; sx = (vw - sw)/2; sy = 0; }
        else         { sw = vw; sh = vw / sr; sx = 0; sy = (vh - sh)/2; }
        c.drawImage(boothVideo, sx, sy, sw, sh, 0, 0, W, H);
      }

      // 2) 気泡
      boothBubbles.forEach(b => {
        const sxB = b.x * dpr, syB = b.y * dpr, srB = b.r * dpr;
        if (sxB < -srB || sxB > W+srB || syB < -srB || syB > H+srB) return;
        c.save();
        c.globalAlpha = b.opacity;
        const grd = c.createRadialGradient(sxB - srB*0.3, syB - srB*0.3, 0, sxB, syB, srB);
        grd.addColorStop(0, 'rgba(255,255,255,0.95)');
        grd.addColorStop(0.4, 'rgba(200,230,255,0.5)');
        grd.addColorStop(1, 'rgba(150,200,240,0.05)');
        c.fillStyle = grd;
        c.beginPath(); c.arc(sxB, syB, srB, 0, Math.PI*2); c.fill();
        c.fillStyle = 'rgba(255,255,255,0.7)';
        c.beginPath(); c.arc(sxB - srB*0.3, syB - srB*0.4, srB*0.25, 0, Math.PI*2); c.fill();
        c.restore();
      });

      // 3) 立ち絵
      const charRect = boothChar.getBoundingClientRect();
      c.drawImage(boothChar,
        charRect.left * dpr, charRect.top * dpr,
        charRect.width * dpr, charRect.height * dpr);

      // 4) スタンプ
      document.querySelectorAll('.placed-stamp').forEach(stamp => {
        const r = stamp.getBoundingClientRect();
        const cx = (r.left + r.width/2) * dpr;
        const cy = (r.top + r.height/2) * dpr;
        const img = stamp.querySelector('img');
        if (img) {
          const w = r.width * dpr, h = r.height * dpr;
          c.drawImage(img, cx - w/2, cy - h/2, w, h);
        } else {
          // 絵文字
          c.save();
          c.font = `${r.height * dpr * 0.9}px serif`;
          c.textAlign = 'center';
          c.textBaseline = 'middle';
          c.fillText(stamp.textContent, cx, cy);
          c.restore();
        }
      });

      // 5) 青フレーム
      const fw = 14 * dpr;
      const grdFrame = c.createLinearGradient(0, 0, W, H);
      grdFrame.addColorStop(0,    '#4aa0e8');
      grdFrame.addColorStop(0.25, '#2a6cc0');
      grdFrame.addColorStop(0.5,  '#5ec8f0');
      grdFrame.addColorStop(0.75, '#2a6cc0');
      grdFrame.addColorStop(1,    '#4aa0e8');
      c.strokeStyle = grdFrame;
      c.lineWidth = fw;
      c.strokeRect(fw/2, fw/2, W - fw, H - fw);
      // 内側グロー
      c.save();
      c.globalCompositeOperation = 'multiply';
      const grdGlow = c.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.7);
      grdGlow.addColorStop(0, 'rgba(255,255,255,1)');
      grdGlow.addColorStop(1, 'rgba(40,100,180,0.6)');
      c.fillStyle = grdGlow;
      c.fillRect(0, 0, W, H);
      c.restore();

      const dataUrl = out.toDataURL('image/png');
      photoPreview.src = dataUrl;
      photoDownload.href = dataUrl;
      out.toBlob(blob => { lastPhotoBlob = blob; }, 'image/png');
      photoResult.classList.add('active');
    }, 200);
  }

  // photo-close / retake はフォトブースにも適用させる
  document.getElementById('photo-close').addEventListener('click', () => {
    if (boothView.classList.contains('active')) closeBooth();
  });
})();
</script>
