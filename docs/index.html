<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>きみ夏宵あそび</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300&display=swap" rel="stylesheet">

  <!-- ── Prefetch top.html assets: 海面ループ中に先読みして遷移後のラグを短縮 ── -->
  <link rel="prefetch" href="top.html">
  <link rel="prefetch" href="css/styles.css">
  <link rel="prefetch" href="css/top.css">
  <link rel="prefetch" href="js/main.js">
  <link rel="prefetch" href="js/data-loader.js">
  <link rel="prefetch" href="assets/logo-dark.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    /* ── Videos ── */
    .vid {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      background: #000;
    }
    #v-surface { z-index: 1; }
    #v-dive    { z-index: 2; opacity: 0; pointer-events: none; }

    /* ── Dark vignette over surface video ── */
    #surface-overlay {
      position: fixed;
      inset: 0;
      z-index: 3;
      background: radial-gradient(
        ellipse at 50% 60%,
        transparent 30%,
        rgba(0, 10, 30, 0.45) 100%
      );
      pointer-events: none;
    }

    /* ── Tap to DIVE hint ── */
    #tap-hint {
      position: fixed;
      bottom: 72px;
      left: 0; right: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    #tap-hint.hidden { opacity: 0; }

    .tap-text {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.9rem, 2.2vw, 1.15rem);
      font-weight: 400;
      letter-spacing: 0.55em;
      color: rgba(255, 255, 255, 0.92);
      text-shadow:
        0 0 12px rgba(120, 200, 255, 0.9),
        0 0 40px rgba(80, 160, 255, 0.4);
      animation: textGlow 3s ease-in-out infinite;
    }

    .tap-arrow {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .tap-arrow span {
      display: block;
      width: 10px; height: 10px;
      border-right: 1.5px solid rgba(255,255,255,0.7);
      border-bottom: 1.5px solid rgba(255,255,255,0.7);
      transform: rotate(45deg);
      animation: chevronFall 1.8s ease-in-out infinite;
      box-shadow: 2px 2px 6px rgba(120,200,255,0.5);
    }
    .tap-arrow span:nth-child(1) { animation-delay: 0s;    opacity: 0.4; }
    .tap-arrow span:nth-child(2) { animation-delay: 0.2s;  opacity: 0.7; }
    .tap-arrow span:nth-child(3) { animation-delay: 0.4s;  opacity: 1.0; }

    @keyframes textGlow {
      0%, 100% {
        text-shadow: 0 0 12px rgba(120,200,255,0.9), 0 0 40px rgba(80,160,255,0.4);
        opacity: 0.85;
      }
      50% {
        text-shadow: 0 0 20px rgba(160,220,255,1.0), 0 0 60px rgba(100,180,255,0.7);
        opacity: 1.0;
      }
    }

    @keyframes chevronFall {
      0%   { transform: rotate(45deg) translateY(-4px); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: rotate(45deg) translateY(4px);  opacity: 0; }
    }

    /* ── Ripple click feedback ── */
    .ripple {
      position: fixed;
      border-radius: 50%;
      border: 1.5px solid rgba(180, 230, 255, 0.6);
      pointer-events: none;
      z-index: 20;
      transform: translate(-50%, -50%) scale(0);
      animation: rippleOut 0.9s ease-out forwards;
    }
    @keyframes rippleOut {
      to { transform: translate(-50%, -50%) scale(6); opacity: 0; }
    }

    /* ── Whiteout overlay ── */
    #whiteout {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }
    #whiteout.active {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>
<body>

  <!-- Sea surface: loops until tap -->
  <video id="v-surface" class="vid" autoplay muted loop playsinline>
    <source src="assets/videos/sea-surface.mp4" type="video/mp4">
  </video>

  <!-- Dive: plays once on tap, ends with whiteout -->
  <video id="v-dive" class="vid" muted playsinline preload="auto">
    <source src="assets/videos/sea-dive.mp4" type="video/mp4">
  </video>

  <!-- Subtle vignette -->
  <div id="surface-overlay"></div>

  <!-- Tap to DIVE -->
  <div id="tap-hint">
    <span class="tap-text">Tap to DIVE</span>
    <div class="tap-arrow">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Whiteout -->
  <div id="whiteout"></div>

<script>
  const vSurface  = document.getElementById('v-surface');
  const vDive     = document.getElementById('v-dive');
  const tapHint   = document.getElementById('tap-hint');
  const whiteout  = document.getElementById('whiteout');
  const overlay   = document.getElementById('surface-overlay');

  let dived = false;

  // ── Ensure surface video plays ──
  vSurface.play().catch(() => {});

  // ── Preload dive video silently ──
  vDive.load();

  // ── Tap / click handler ──
  function onTap(e) {
    if (dived) return;
    dived = true;

    // ダイブ再生中(数秒)にトップページのヒーロー動画をキャッシュへ先読み
    fetch('assets/videos/bg-lantern.mp4').catch(() => {});

    // Ripple effect at tap point
    const x = e.clientX ?? e.touches?.[0]?.clientX ?? window.innerWidth / 2;
    const y = e.clientY ?? e.touches?.[0]?.clientY ?? window.innerHeight / 2;
    const size = Math.max(window.innerWidth, window.innerHeight) * 0.4;
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px`;
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 900);

    // Hide hint
    tapHint.classList.add('hidden');

    // Cross-fade: surface fades out, dive fades in
    vDive.style.transition = 'opacity 0.4s ease';
    vDive.style.opacity = '1';
    vSurface.style.transition = 'opacity 0.4s ease';
    vSurface.style.opacity = '0';
    overlay.style.transition = 'opacity 0.4s ease';
    overlay.style.opacity = '0';

    // Play dive video
    vDive.currentTime = 0;
    vDive.play().catch(() => {});

    // When dive ends → whiteout → navigate
    vDive.addEventListener('ended', () => {
      whiteout.classList.add('active');
      setTimeout(() => {
        window.location.href = 'top.html?from=intro';
      }, 950);
    }, { once: true });

    // Failsafe: if dive video fails (e.g. very short), wait max 15s
    setTimeout(() => {
      if (!whiteout.classList.contains('active')) {
        whiteout.classList.add('active');
        setTimeout(() => { window.location.href = 'top.html?from=intro'; }, 950);
      }
    }, 15000);
  }

  document.addEventListener('click',      onTap);
  document.addEventListener('touchstart', onTap, { passive: true });
</script>
</body>
</html>
